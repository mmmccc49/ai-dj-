name: Build Installers

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Windows installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Build Windows installer
        shell: pwsh
        run: |
          npm run dist:win *>&1 | Tee-Object -FilePath build-windows.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload Windows artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-dj-windows
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
            build-windows.log
          if-no-files-found: warn

      - name: Attach Windows installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml

  build-macos:
    name: macOS installer
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check JavaScript
        run: npm run check

      - name: Build macOS installer
        run: |
          set -o pipefail
          npm run dist:mac 2>&1 | tee build-macos.log
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: "false"

      - name: Upload macOS artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-dj-macos
          path: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
            build-macos.log
          if-no-files-found: warn

      - name: Attach macOS installer to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.dmg
            dist/*.zip
            dist/*.blockmap
            dist/latest-mac.yml
