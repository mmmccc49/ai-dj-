<svg width="480" height="800" viewBox="0 0 480 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <title>Cloudio Player editable Figma import</title>
  <desc>Import this SVG into Figma. Major sections are grouped and named for easier editing.</desc>
  <defs>
    <radialGradient id="goldGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(240 -40) rotate(90) scale(380)">
      <stop stop-color="#D4A853" stop-opacity="0.3"/>
      <stop offset="0.65" stop-color="#D4A853" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="playButton" x1="232" y1="218" x2="284" y2="270" gradientUnits="userSpaceOnUse">
      <stop stop-color="#E8BF6A"/>
      <stop offset="1" stop-color="#D4A853"/>
    </linearGradient>
    <linearGradient id="discFill" x1="46" y1="100" x2="192" y2="246" gradientUnits="userSpaceOnUse">
      <stop stop-color="#2A2A35"/>
      <stop offset="1" stop-color="#15151C"/>
    </linearGradient>
    <linearGradient id="activeTrack" x1="24" y1="410" x2="456" y2="410" gradientUnits="userSpaceOnUse">
      <stop stop-color="#D4A853" stop-opacity="0.14"/>
      <stop offset="1" stop-color="#D4A853" stop-opacity="0"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="150%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#000000" flood-opacity="0.45"/>
    </filter>
    <filter id="buttonGlow" x="-50%" y="-50%" width="200%" height="200%" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#D4A853" flood-opacity="0.35"/>
    </filter>
    <clipPath id="albumClip">
      <circle cx="119" cy="173" r="73"/>
    </clipPath>
  </defs>

  <g id="Cloudio Player / Full Window">
    <rect id="Window Background" width="480" height="800" fill="#0A0A0F"/>
    <ellipse id="Ambient Gold Glow" cx="240" cy="-40" rx="350" ry="350" fill="url(#goldGlow)"/>
    <ellipse id="Lower Left Texture" cx="96" cy="640" rx="260" ry="210" fill="#D4A853" opacity="0.04"/>
    <ellipse id="Upper Right Texture" cx="390" cy="140" rx="220" ry="180" fill="#D4A853" opacity="0.03"/>

    <g id="Titlebar">
      <rect id="Titlebar Drag Area" width="480" height="44" fill="#0A0A0F" opacity="0"/>
      <circle id="Brand Dot" cx="22" cy="22" r="4" fill="#D4A853"/>
      <text id="Brand Name" x="36" y="27" fill="#A7A098" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5">CLOUDIO</text>
      <g id="Mini Mode Button">
        <rect x="440" y="7" width="30" height="30" rx="8" fill="#1A1A24" opacity="0"/>
        <rect x="448" y="21" width="14" height="2" rx="1" fill="#827C77"/>
      </g>
    </g>

    <g id="Player Area">
      <rect id="Player Bounds" x="0" y="44" width="480" height="260" fill="#0A0A0F" opacity="0"/>

      <g id="Album Cover" filter="url(#softShadow)">
        <circle id="Cover Glow" cx="119" cy="173" r="92" fill="#D4A853" opacity="0.12"/>
        <circle id="Disc Base" cx="119" cy="173" r="73" fill="url(#discFill)" stroke="#4A3D28"/>
        <g id="Mock Album Art" clip-path="url(#albumClip)">
          <rect x="46" y="100" width="146" height="146" fill="#F0ECE4"/>
          <path d="M46 190 C72 166 94 174 120 160 C145 146 169 154 192 132 L192 246 L46 246 Z" fill="#315138"/>
          <path d="M54 101 L192 101 L192 146 C157 129 135 122 105 129 C78 135 60 124 46 116 L46 101 Z" fill="#E4E0D7"/>
          <rect x="82" y="145" width="18" height="52" rx="6" fill="#C44D32"/>
          <rect x="115" y="140" width="18" height="58" rx="6" fill="#D65E3E"/>
          <rect x="144" y="146" width="18" height="50" rx="6" fill="#CC5538"/>
          <circle cx="91" cy="132" r="10" fill="#C9986C"/>
          <circle cx="124" cy="128" r="9" fill="#D0A075"/>
          <circle cx="153" cy="134" r="9" fill="#D4A77D"/>
          <text x="84" y="219" fill="#FFFFFF" font-family="Georgia, serif" font-size="18" font-style="italic" transform="rotate(-18 84 219)">THE PROTEGE</text>
        </g>
        <circle id="Inner Disc Ring" cx="119" cy="173" r="73" stroke="#000000" stroke-opacity="0.35" stroke-width="10"/>
        <circle id="Cover Center Hole" cx="119" cy="173" r="8" fill="#0A0A0F" stroke="#D4A853" stroke-opacity="0.45" stroke-width="2"/>
      </g>

      <g id="Track Details">
        <text id="Track Title" x="220" y="125" fill="#F0ECE4" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="20" font-weight="600">早到的u</text>
        <text id="Track Artist" x="220" y="151" fill="#F0ECE4" fill-opacity="0.5" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="13" letter-spacing="1">Gareth.T</text>
      </g>

      <g id="Progress">
        <rect id="Progress Track" x="220" y="178" width="210" height="3" rx="1.5" fill="#FFFFFF" opacity="0.08"/>
        <rect id="Progress Fill" x="220" y="178" width="28" height="3" rx="1.5" fill="#D4A853"/>
        <circle id="Progress Thumb" cx="248" cy="179.5" r="8" fill="#E8BF6A" opacity="0.92"/>
        <text id="Elapsed Time" x="220" y="202" fill="#F0ECE4" fill-opacity="0.3" font-family="Consolas, monospace" font-size="11">0:20</text>
        <text id="Duration Time" x="404" y="202" fill="#F0ECE4" fill-opacity="0.3" font-family="Consolas, monospace" font-size="11">3:22</text>
      </g>

      <g id="Transport Controls">
        <g id="Previous Button">
          <circle cx="254" cy="246" r="20" fill="#12121A" opacity="0.3"/>
          <path d="M246 238H249V254H246V238ZM251 246L263 238V254L251 246Z" fill="#A7A098"/>
        </g>
        <g id="Play Pause Button" filter="url(#buttonGlow)">
          <circle cx="310" cy="246" r="26" fill="url(#playButton)"/>
          <rect x="303" y="236" width="5" height="20" rx="1" fill="#1A1A0A"/>
          <rect x="313" y="236" width="5" height="20" rx="1" fill="#1A1A0A"/>
        </g>
        <g id="Next Button">
          <circle cx="366" cy="246" r="20" fill="#12121A" opacity="0.3"/>
          <path d="M359 254L371 246L359 238V254ZM373 238H376V254H373V238Z" fill="#A7A098"/>
        </g>
      </g>
    </g>

    <g id="Playlist Area">
      <line id="Playlist Divider" x1="0" y1="304" x2="480" y2="304" stroke="#FFFFFF" stroke-opacity="0.06"/>
      <text id="Playlist Label" x="24" y="336" fill="#D4A853" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11" font-weight="700" letter-spacing="2.5">DAILY RECOMMENDATIONS</text>
      <text id="Track Count" x="380" y="336" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11" letter-spacing="1">30 tracks</text>

      <g id="Playlist Form">
        <rect id="Playlist Input" x="24" y="354" width="262" height="30" rx="6" fill="#12121A" stroke="#FFFFFF" stroke-opacity="0.06"/>
        <text x="38" y="374" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="12">Playlist URL or ID...</text>
        <rect id="Load Button" x="294" y="354" width="76" height="30" rx="6" fill="#1A1A24"/>
        <text x="318" y="374" fill="#A7A098" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">LOAD</text>
        <rect id="Daily Button" x="378" y="354" width="78" height="30" rx="6" fill="#D4A853" fill-opacity="0.12" stroke="#D4A853" stroke-opacity="0.18"/>
        <text x="401" y="374" fill="#D4A853" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="10" font-weight="700" letter-spacing="1.5">DAILY</text>
      </g>

      <g id="Track List">
        <g id="Track Row / Active">
          <rect x="24" y="402" width="432" height="58" rx="8" fill="url(#activeTrack)" stroke="#D4A853" stroke-opacity="0.16"/>
          <rect x="36" y="413" width="36" height="36" rx="6" fill="#E7E0D3"/>
          <path d="M36 437 C45 428 52 432 60 425 C67 419 73 423 72 421 L72 449 L36 449 Z" fill="#315138"/>
          <rect x="46" y="423" width="5" height="15" rx="2" fill="#C44D32"/>
          <rect x="56" y="421" width="5" height="17" rx="2" fill="#D65E3E"/>
          <text x="84" y="431" fill="#D4A853" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="13" font-weight="500">早到的u</text>
          <text x="84" y="450" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11">Gareth.T</text>
          <text x="416" y="438" fill="#F0ECE4" fill-opacity="0.3" font-family="Consolas, monospace" font-size="11">3:22</text>
        </g>

        <g id="Track Row 2">
          <rect x="24" y="468" width="432" height="54" rx="8" fill="#12121A" opacity="0"/>
          <rect x="36" y="477" width="36" height="36" rx="6" fill="#31426A"/>
          <path d="M38 504 C50 486 60 493 72 480 L72 513 L38 513 Z" fill="#86A7D8" opacity="0.45"/>
          <text x="84" y="494" fill="#F0ECE4" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="13" font-weight="500">怎么说我不爱你</text>
          <text x="84" y="513" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11">Zkaaai</text>
          <text x="416" y="502" fill="#F0ECE4" fill-opacity="0.3" font-family="Consolas, monospace" font-size="11">3:16</text>
        </g>

        <g id="Track Row 3">
          <rect x="24" y="530" width="432" height="54" rx="8" fill="#12121A" opacity="0"/>
          <rect x="36" y="539" width="36" height="36" rx="6" fill="#9B2A99"/>
          <rect x="48" y="552" width="13" height="13" rx="2" fill="#F0A4D8"/>
          <text x="84" y="556" fill="#F0ECE4" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="13" font-weight="500">Hug Me (Prod.WANGZITONG)</text>
          <text x="84" y="575" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11">SHARK卫彬月 / WANGZITONG</text>
          <text x="416" y="564" fill="#F0ECE4" fill-opacity="0.3" font-family="Consolas, monospace" font-size="11">3:28</text>
        </g>

        <g id="Track Row 4">
          <rect x="24" y="592" width="432" height="54" rx="8" fill="#12121A" opacity="0"/>
          <rect x="36" y="601" width="36" height="36" rx="6" fill="#1C1715"/>
          <rect x="45" y="606" width="18" height="26" rx="3" fill="#A47B5E" opacity="0.55"/>
          <text x="84" y="618" fill="#F0ECE4" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="13" font-weight="500">无条件</text>
          <text x="84" y="637" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11">陈奕迅</text>
          <text x="416" y="626" fill="#F0ECE4" fill-opacity="0.3" font-family="Consolas, monospace" font-size="11">3:49</text>
        </g>

        <g id="Track Row 5">
          <rect x="24" y="654" width="432" height="54" rx="8" fill="#12121A" opacity="0"/>
          <rect x="36" y="663" width="36" height="36" rx="6" fill="#F0ECE4"/>
          <path d="M41 687 C51 675 60 680 72 668 L72 699 L41 699 Z" fill="#32464B"/>
          <text x="84" y="680" fill="#F0ECE4" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="13" font-weight="500">我们一样可惜</text>
          <text x="84" y="699" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="11">好乐团</text>
          <text x="416" y="688" fill="#F0ECE4" fill-opacity="0.3" font-family="Consolas, monospace" font-size="11">7:14</text>
        </g>
      </g>

      <g id="Scrollbar">
        <rect x="448" y="412" width="6" height="286" rx="3" fill="#1A1A24"/>
        <rect x="448" y="418" width="6" height="68" rx="3" fill="#D4A853" opacity="0.18"/>
      </g>
    </g>

    <g id="Status Bar">
      <rect x="0" y="772" width="480" height="28" fill="#000000" opacity="0.4"/>
      <line x1="0" y1="772" x2="480" y2="772" stroke="#FFFFFF" stroke-opacity="0.06"/>
      <circle cx="22" cy="786" r="3" fill="#D4A853"/>
      <text id="Status Text" x="36" y="790" fill="#F0ECE4" fill-opacity="0.3" font-family="Microsoft YaHei UI, PingFang SC, sans-serif" font-size="10" letter-spacing="1.5">Playing · exhigh</text>
    </g>
  </g>
</svg>
